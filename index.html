<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVJ | REAL-TIME GAMER MESSENGER</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-box {
            background: #0a0f1a;
            border: 2px solid #0ff;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 0 50px rgba(0,255,255,0.3);
        }

        .auth-box h2 {
            color: #0ff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #010101;
            border: 1px solid #ff00ff;
            color: #0ff;
            border-radius: 8px;
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #ff00ff33, #00ffff33);
            border: 1px solid #ff00ff;
            color: #0ff;
            cursor: pointer;
            border-radius: 8px;
            font-family: monospace;
        }

        .switch-auth {
            text-align: center;
            margin-top: 15px;
            color: #88aaff;
            cursor: pointer;
        }

        .rvj-messenger {
            width: 1300px;
            max-width: 95vw;
            height: 88vh;
            background: rgba(8,12,20,0.95);
            border-radius: 16px;
            border: 1px solid rgba(0,255,255,0.3);
            display: flex;
            overflow: hidden;
            display: none;
        }

        .gamer-sidebar {
            width: 32%;
            background: rgba(5,8,15,0.9);
            border-right: 2px solid #00ffff33;
            display: flex;
            flex-direction: column;
        }

        .gamer-header {
            padding: 20px;
            background: linear-gradient(135deg, #0a0f1f, #010101);
            border-bottom: 2px solid #ff00ff;
            display: flex;
            justify-content: space-between;
        }

        .rvj-logo {
            font-size: 28px;
            background: linear-gradient(45deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: #ff000033;
            border: 1px solid #ff0000;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .player-stats {
            padding: 12px 20px;
            background: #00000055;
            color: #0ff;
            font-size: 12px;
        }

        .search-gamer {
            padding: 15px;
        }

        .search-gamer input {
            width: 100%;
            padding: 10px;
            background: #0a0f1a;
            border: 1px solid #ff00ff77;
            border-radius: 8px;
            color: #0ff;
        }

        .contacts-gamer {
            flex: 1;
            overflow-y: auto;
        }

        .gamer-contact {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #1f2a3e;
            transition: 0.2s;
        }

        .gamer-contact:hover {
            background: #0ff11a;
        }

        .gamer-contact.active {
            background: linear-gradient(90deg, #ff00ff22, #0ff11a);
            border-left: 3px solid #ff00ff;
        }

        .gamer-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0ff, #f0f);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #000;
        }

        .online-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0f0;
            display: inline-block;
            margin-left: 8px;
        }

        .offline-status {
            background: #666;
        }

        .add-friend-btn {
            background: #ff00ff33;
            border: 1px solid #0ff;
            color: #0ff;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
        }

        .chat-gamer {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-gamer-header {
            padding: 16px 20px;
            background: #0a0f1a;
            border-bottom: 2px solid #00ffff88;
        }

        .messages-gamer {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-gamer {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message-gamer.received {
            align-items: flex-start;
        }

        .message-gamer.sent {
            align-items: flex-end;
            align-self: flex-end;
        }

        .bubble-gamer {
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        .received .bubble-gamer {
            background: #11161f;
            border: 1px solid #0ff88a;
            color: #bbffff;
        }

        .sent .bubble-gamer {
            background: linear-gradient(135deg, #ff00cc33, #00ffff33);
            border: 1px solid #ff44ff;
            color: #ffffff;
        }

        .input-gamer-area {
            padding: 15px 20px;
            background: #080c14;
            border-top: 1px solid #ff00ff88;
            display: flex;
            gap: 12px;
        }

        .input-gamer-area input {
            flex: 1;
            background: #010101dd;
            border: 1px solid #0ff;
            padding: 12px;
            border-radius: 40px;
            color: #0ff;
        }

        .gamer-btn {
            background: #0a0f1f;
            border: 2px solid #f0f;
            color: #f0f;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="auth-overlay" id="authOverlay">
    <div class="auth-box">
        <h2>◢ RVJ ◣</h2>
        <div id="authForm">
            <input type="text" id="loginUsername" class="auth-input" placeholder="GAMER TAG">
            <input type="password" id="loginPassword" class="auth-input" placeholder="PASSWORD">
            <button class="auth-btn" onclick="login()">LOGIN</button>
            <div class="switch-auth" onclick="showRegister()">NO ACCOUNT? REGISTER</div>
        </div>
    </div>
</div>

<div class="rvj-messenger" id="messengerApp">
    <div class="gamer-sidebar">
        <div class="gamer-header">
            <div class="rvj-logo">◢ RVJ ◣</div>
            <div class="logout-btn" onclick="logout()">EXIT</div>
        </div>
        <div class="player-stats" id="currentUserDisplay">USER</div>
        <div class="search-gamer">
            <input type="text" id="searchUsers" placeholder="FIND PLAYER...">
        </div>
        <div class="contacts-gamer" id="contactsList"></div>
        <div class="search-gamer">
            <input type="text" id="addFriendInput" placeholder="ADD BY TAG">
            <button class="gamer-btn" style="width:100%; margin-top:8px;" onclick="sendFriendRequest()">SEND REQUEST</button>
        </div>
    </div>
    <div class="chat-gamer">
        <div class="chat-gamer-header" id="chatHeader">
            <div style="font-weight:bold;color:#0ff;" id="chatUserName">SELECT CHAT</div>
        </div>
        <div class="messages-gamer" id="messagesContainer"></div>
        <div class="input-gamer-area">
            <input type="text" id="messageInput" placeholder="TYPE MESSAGE...">
            <button class="gamer-btn" id="sendBtn">SEND</button>
        </div>
    </div>
</div>

<script>
    let socket = null;
    let currentUser = null;
    let currentChatUserId = null;
    let allUsers = [];
    let messagesHistory = {}; // { friendId: [messages] }

    // --- Auth functions ---
    async function register() {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        const res = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if(data.success) {
            alert('✅ Account created! Please login.');
            showLogin();
        } else {
            alert('❌ ' + data.error);
        }
    }

    async function login() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if(data.success) {
            currentUser = data.user;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('messengerApp').style.display = 'flex';
            document.getElementById('currentUserDisplay').innerHTML = `🎮 ${currentUser.username}`;
            
            initSocket();
            await loadAllUsers();
            renderFriendsList();
            
            document.getElementById('sendBtn').onclick = sendMessage;
            document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            document.getElementById('searchUsers').oninput = () => renderFriendsList();
        } else {
            alert('❌ Invalid credentials');
        }
    }

    async function loadAllUsers() {
        const res = await fetch('/users');
        allUsers = await res.json();
    }

    function initSocket() {
        socket = io();
        socket.on('connect', () => {
            socket.emit('user-online', currentUser.id);
        });
        
        socket.on('new-message', (msg) => {
            if(!messagesHistory[msg.fromUserId]) messagesHistory[msg.fromUserId] = [];
            messagesHistory[msg.fromUserId].push({
                text: msg.text,
                fromId: msg.fromUserId,
                timestamp: msg.timestamp
            });
            if(currentChatUserId === msg.fromUserId) {
                renderMessages();
            }
            renderFriendsList(); // update last message preview
        });
        
        socket.on('friend-request-received', (data) => {
            alert(`📨 Friend request from ${data.fromUser.username}`);
            renderFriendsList();
        });
        
        socket.on('friend-added', (data) => {
            alert(`🎉 ${data.friend.username} is now your friend!`);
            loadAllUsers().then(() => renderFriendsList());
        });
        
        socket.on('friend-status-change', (data) => {
            const user = allUsers.find(u => u.id === data.userId);
            if(user) user.online = data.online;
            renderFriendsList();
        });
    }

    async function sendFriendRequest() {
        const tag = document.getElementById('addFriendInput').value;
        const targetUser = allUsers.find(u => u.username === tag);
        if(!targetUser) {
            alert("❌ Player not found");
            return;
        }
        if(targetUser.id === currentUser.id) {
            alert("❌ Can't add yourself");
            return;
        }
        socket.emit('send-friend-request', {
            fromUserId: currentUser.id,
            toUserId: targetUser.id
        });
        alert("📨 Request sent!");
        document.getElementById('addFriendInput').value = '';
    }

    function acceptFriendRequest(requesterId) {
        socket.emit('accept-friend-request', {
            currentUserId: currentUser.id,
            requesterId: requesterId
        });
    }

    function declineFriendRequest(requesterId) {
        socket.emit('decline-friend-request', {
            currentUserId: currentUser.id,
            requesterId: requesterId
        });
        renderFriendsList();
    }

    function openChat(friendId) {
        currentChatUserId = friendId;
        const friend = allUsers.find(u => u.id === friendId);
        document.getElementById('chatUserName').innerHTML = `${friend?.username} ${friend?.online ? '🟢' : '⚫'}`;
        renderMessages();
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text || !currentChatUserId) return;
        
        const timestamp = new Date().toLocaleTimeString();
        if(!messagesHistory[currentChatUserId]) messagesHistory[currentChatUserId] = [];
        messagesHistory[currentChatUserId].push({
            text: text,
            fromId: currentUser.id,
            timestamp: timestamp
        });
        
        socket.emit('send-message', {
            fromUserId: currentUser.id,
            toUserId: currentChatUserId,
            text: text,
            timestamp: timestamp
        });
        
        input.value = '';
        renderMessages();
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if(!currentChatUserId) {
            container.innerHTML = '<div style="text-align:center;color:#88aaff;">Select a friend</div>';
            return;
        }
        const messages = messagesHistory[currentChatUserId] || [];
        container.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message-gamer ${msg.fromId === currentUser.id ? 'sent' : 'received'}`;
            div.innerHTML = `<div class="bubble-gamer">${escapeHtml(msg.text)}</div><div style="font-size:9px; margin-top:4px;">⚡ ${msg.timestamp}</div>`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function renderFriendsList() {
        const container = document.getElementById('contactsList');
        const searchTerm = document.getElementById('searchUsers').value.toLowerCase();
        
        // Get current user data from server (in real app you'd have full user object)
        fetch('/users').then(res => res.json()).then(serverUsers => {
            allUsers = serverUsers;
            // Find current user's full data (we don't have friend list on client)
            // For demo, we'll manually sync — in production store in localStorage
            // Quick fix: we'll store friend list in localStorage after accept
            let friendIds = JSON.parse(localStorage.getItem(`rvj_friends_${currentUser.id}`)) || [];
            
            let html = '';
            // Show pending requests
            const pendingRequests = JSON.parse(localStorage.getItem(`rvj_requests_${currentUser.id}`)) || [];
            if(pendingRequests.length > 0) {
                html += `<div style="padding:10px;color:#ffaa44;">⚔️ REQUESTS ⚔️</div>`;
                pendingRequests.forEach(req => {
                    html += `
                        <div class="gamer-contact">
                            <div class="gamer-avatar">${req.avatar}</div>
                            <div>${req.username}</div>
                            <button class="add-friend-btn" onclick="acceptFriendRequest(${req.id})">✔️</button>
                            <button class="add-friend-btn" onclick="declineFriendRequest(${req.id})">❌</button>
                        </div>
                    `;
                });
            }
            
            const friends = allUsers.filter(u => friendIds.includes(u.id) && u.username.toLowerCase().includes(searchTerm));
            if(friends.length > 0) {
                html += `<div style="padding:10px;color:#0ff;">🎧 CLAN 🎧</div>`;
                friends.forEach(f => {
                    html += `
                        <div class="gamer-contact ${currentChatUserId === f.id ? 'active' : ''}" onclick="openChat(${f.id})">
                            <div class="gamer-avatar">${f.avatar}</div>
                            <div>
                                <div style="color:#0ff;">${f.username}</div>
                                <div class="${f.online ? 'online-status' : 'offline-status'}" style="width:8px;height:8px;border-radius:50%;display:inline-block;"></div>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `<div style="padding:20px;color:#888;">💀 No friends yet</div>`;
            }
            container.innerHTML = html;
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function showRegister() {
        const authForm = document.getElementById('authForm');
        authForm.innerHTML = `
            <input type="text" id="regUsername" class="auth-input" placeholder="NEW GAMER TAG">
            <input type="password" id="regPassword" class="auth-input" placeholder="PASSWORD">
            <button class="auth-btn" onclick="register()">REGISTER</button>
            <div class="switch-auth" onclick="showLogin()">← BACK</div>
        `;
    }

    function showLogin() {
        const authForm = document.getElementById('authForm');
        authForm.innerHTML = `
            <input type="text" id="loginUsername" class="auth-input" placeholder="GAMER TAG">
            <input type="password" id="loginPassword" class="auth-input" placeholder="PASSWORD">
            <button class="auth-btn" onclick="login()">LOGIN</button>
            <div class="switch-auth" onclick="showRegister()">NO ACCOUNT? REGISTER</div>
        `;
    }

    function logout() {
        if(socket) socket.disconnect();
        currentUser = null;
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('messengerApp').style.display = 'none';
        showLogin();
    }
</script>
</body>
</html>
